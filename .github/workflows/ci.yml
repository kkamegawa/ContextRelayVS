name: CI

on:
  push:
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read    # least-privilege for checkout
      checks: write     # required by dorny/test-reporter

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ContextRelayVS.sln

      - name: Audit packages
        shell: pwsh
        run: .\build\Invoke-PackageAudit.ps1 -SolutionPath .\ContextRelayVS.sln

      - name: Build solution
        run: dotnet build ContextRelayVS.sln -c Release --no-restore -v minimal

      - name: Test core
        run: >-
          dotnet test tests\ContextRelay.Core.Tests\ContextRelay.Core.Tests.csproj
          -c Release --no-build -v minimal
          --collect:"XPlat Code Coverage"
          --logger trx
          --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.1.0
        if: always()
        with:
          name: xUnit Tests
          path: TestResults/*.trx
          reporter: dotnet-trx

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v5.5.2
        with:
          files: TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false

      - name: Verify VSIX exists
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path .\src\ContextRelay.VSExtension\bin\Release -Filter *.vsix -Recurse
          if (-not $vsix) {
            throw "VSIX artifact was not generated."
          }

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ContextRelayVS-vsix
          path: src\ContextRelay.VSExtension\bin\Release\**\*.vsix
