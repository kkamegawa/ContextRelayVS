name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read    # least-privilege for checkout
      checks: write     # required by dorny/test-reporter

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ContextRelayVS.sln

      - name: Audit packages
        shell: pwsh
        run: .\build\Invoke-PackageAudit.ps1 -SolutionPath .\ContextRelayVS.sln

      - name: Build solution
        run: dotnet build ContextRelayVS.sln -c Release --no-restore -v minimal

      - name: Test core
        run: >-
          dotnet test tests\ContextRelay.Core.Tests\ContextRelay.Core.Tests.csproj
          -c Release --no-build -v minimal
          --collect:"XPlat Code Coverage"
          --logger trx
          --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@a6ddd83ac95ff4586f5d3aceeb314d9a1841db95 # v3.0.0
        if: always()
        with:
          name: xUnit Tests
          path: TestResults/*.trx
          reporter: dotnet-trx

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false

      - name: Verify VSIX exists
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path .\src\ContextRelay.VSExtension\bin\Release -Filter *.vsix -Recurse
          if (-not $vsix) {
            throw "VSIX artifact was not generated."
          }

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ContextRelayVS-vsix
          path: src\ContextRelay.VSExtension\bin\Release\**\*.vsix
