name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        shell: pwsh
        run: |
          # Ensure the tagged commit is reachable from origin/main so that
          # releases are only created from the main branch history.
          git fetch origin main --no-tags
          $tagSha  = git rev-parse HEAD
          $mainSha = git rev-parse origin/main
          git merge-base --is-ancestor $tagSha $mainSha
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tagged commit $tagSha is not on the main branch. Release aborted."
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ContextRelayVS.sln

      - name: Audit packages
        shell: pwsh
        run: .\build\Invoke-PackageAudit.ps1 -SolutionPath .\ContextRelayVS.sln

      - name: Build solution
        run: dotnet build ContextRelayVS.sln -c Release --no-restore -v minimal

      - name: Test core
        run: dotnet test tests\ContextRelay.Core.Tests\ContextRelay.Core.Tests.csproj -c Release --no-build -v minimal

      - name: Find VSIX
        id: find_vsix
        shell: pwsh
        run: |
          # Search recursively so the step is not sensitive to the framework sub-folder name.
          $vsix = Get-ChildItem -Path .\src\ContextRelay.VSExtension\bin\Release -Filter *.vsix -Recurse |
                    Select-Object -First 1
          if (-not $vsix) {
            throw "VSIX artifact was not generated."
          }
          Write-Host "Found VSIX: $($vsix.FullName)"
          "vsix_path=$($vsix.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "vsix_name=$($vsix.Name)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ContextRelayVS-vsix
          path: ${{ steps.find_vsix.outputs.vsix_path }}

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag      = "${{ github.ref_name }}"
          $vsixPath = "${{ steps.find_vsix.outputs.vsix_path }}"
          $vsixName = "${{ steps.find_vsix.outputs.vsix_name }}"

          gh release create $tag `
            --title "ContextRelayVS $tag" `
            --generate-notes `
            "${vsixPath}#${vsixName}"
