name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        shell: pwsh
        run: |
          # Ensure the tagged commit is reachable from origin/main so that
          # releases are only created from the main branch history.
          git fetch origin main --no-tags
          $tagSha  = git rev-parse HEAD
          $mainSha = git rev-parse origin/main
          git merge-base --is-ancestor $tagSha $mainSha
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tagged commit $tagSha is not on the main branch. Release aborted."
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ContextRelayVS.sln

      - name: Patch VSIX version from tag
        id: patch_version
        shell: pwsh
        run: |
          # Convert git tag (vX.Y.Z or vX.Y.Z.W) to the 4-part VSIX version format.
          # vX.Y.Z   -> X.Y.Z.0  (SemVer 3-part tag gets a zero patch digit)
          # vX.Y.Z.W -> X.Y.Z.W  (4-part tag is used as-is for hotfix re-publishes)
          $rawTag = "${{ github.ref_name }}"
          $semver = $rawTag.TrimStart('v')
          if ($semver -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Tag '$rawTag' does not match the required version format. Expected vX.Y.Z or vX.Y.Z.W (numeric parts only)."
          }
          $parts  = $semver.Split('.')
          if ($parts.Count -eq 3) { $vsixVersion = "$semver.0" }
          elseif ($parts.Count -eq 4) { $vsixVersion = $semver }
          else { throw "Unsupported tag format '$rawTag'. Expected vX.Y.Z or vX.Y.Z.W." }

          # Patch the Identity Version attribute in both vsixmanifest source files so
          # the version embedded in the produced VSIX always matches the git tag.
          $manifests = @(
            '.\src\ContextRelay.VSExtension\source.extension.vsixmanifest',
            '.\src\ContextRelay.VSExtension.Package\source.extension.vsixmanifest'
          )
          foreach ($manifestPath in $manifests) {
            # Preserve BOM if present by reading raw bytes, but use XML API for the patch.
            $bom = $false
            $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $manifestPath))
            if ($bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
              $bom = $true
            }
            $xml = [xml](Get-Content $manifestPath -Raw -Encoding UTF8)
            $ns  = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
            $ns.AddNamespace('v', 'http://schemas.microsoft.com/developer/vsx-schema/2011')
            $identity = $xml.SelectSingleNode('//v:PackageManifest/v:Metadata/v:Identity', $ns)
            if ($null -eq $identity) {
              throw "Could not locate the Identity element in '$manifestPath'. The vsixmanifest may be malformed."
            }
            $identity.SetAttribute('Version', $vsixVersion)
            $settings = New-Object System.Xml.XmlWriterSettings
            $settings.Encoding = if ($bom) { New-Object System.Text.UTF8Encoding $true } `
                                  else      { New-Object System.Text.UTF8Encoding $false }
            $settings.Indent = $true
            $writer = [System.Xml.XmlWriter]::Create((Resolve-Path $manifestPath), $settings)
            $xml.Save($writer)
            $writer.Close()
            Write-Host "Patched $manifestPath -> Version=$vsixVersion"
          }
          "vsix_version=$vsixVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Audit packages
        shell: pwsh
        run: .\build\Invoke-PackageAudit.ps1 -SolutionPath .\ContextRelayVS.sln

      - name: Build solution
        run: dotnet build ContextRelayVS.sln -c Release --no-restore -v minimal

      - name: Test core
        run: dotnet test tests\ContextRelay.Core.Tests\ContextRelay.Core.Tests.csproj -c Release --no-build -v minimal

      - name: Find VSIX
        id: find_vsix
        shell: pwsh
        run: |
          # Search recursively so the step is not sensitive to the framework sub-folder name.
          $vsix = Get-ChildItem -Path .\src\ContextRelay.VSExtension\bin\Release -Filter *.vsix -Recurse |
                    Select-Object -First 1
          if (-not $vsix) {
            throw "VSIX artifact was not generated."
          }
          Write-Host "Found VSIX: $($vsix.FullName)"
          "vsix_path=$($vsix.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "vsix_name=$($vsix.Name)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ContextRelayVS-vsix
          path: ${{ steps.find_vsix.outputs.vsix_path }}

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag      = "${{ github.ref_name }}"
          $vsixPath = "${{ steps.find_vsix.outputs.vsix_path }}"
          $vsixName = "${{ steps.find_vsix.outputs.vsix_name }}"

          gh release create $tag `
            --title "ContextRelayVS $tag" `
            --generate-notes `
            "${vsixPath}#${vsixName}"
